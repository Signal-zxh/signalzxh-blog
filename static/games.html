<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .admin-link {
            color: #6b7a8d;
            cursor: pointer;
            padding: 6px 14px;
            border: 1px solid #23272b;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .admin-link:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 20px;
        }
        .card h3 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 1.25rem;
        }
        .card p {
            color: #9aa4b2;
            line-height: 1.6;
        }
        .card ul {
            color: #9aa4b2;
            margin-top: 12px;
            padding-left: 20px;
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo">✦ Signal </span>
    
    <div class="nav">
        <a href="/">首页</a>
        <a href="/tools">工具</a>
        <a href="/games" class="active">游戏</a>
        <a href="/about">关于</a>
    </div>
    
    <div class="header-right">
        <span onclick="showLoginModal()" class="admin-link">管理</span>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>🎮 游戏页面</h3>
        <p>这里是游戏页面的占位内容。您可以在这里添加各种小游戏，例如：</p>
        <ul>
            <li>贪吃蛇游戏</li>
            <li>俄罗斯方块</li>
            <li>2048 游戏</li>
            <li>拼图游戏</li>
            <li>猜数字游戏</li>
        </ul>
    </div>

    <div class="card">
        <h3>🎲 开发中</h3>
        <p>更多游戏功能正在开发中...敬请期待！</p>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); justify-content:center; align-items:center; z-index:2000;">
    <div style="background:#1a1a1a; padding:24px; border-radius:12px; width:320px; border:1px solid #23272b;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0;">登录管理</h2>
            <span onclick="hideLoginModal()" style="color:#9aa4b2; cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input id="loginUsername" placeholder="用户名" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <input id="loginPassword" type="password" placeholder="密码" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <button onclick="login()" style="padding:10px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer;">
                登录
            </button>
            <div id="loginResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
        </div>
    </div>
</div>

<script>
function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex"
}

function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none"
    document.getElementById("loginResult").innerHTML = ""
    document.getElementById("loginUsername").value = ""
    document.getElementById("loginPassword").value = ""
}

document.getElementById("loginModal").addEventListener("click", function(e) {
    if (e.target === this) {
        hideLoginModal()
    }
})

async function login() {
    const username = document.getElementById("loginUsername").value
    const password = document.getElementById("loginPassword").value
    const resultDiv = document.getElementById("loginResult")

    if (!username.trim()) {
        resultDiv.innerHTML = "❌ 请输入用户名"
        return
    }
    if (!password.trim()) {
        resultDiv.innerHTML = "❌ 请输入密码"
        return
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.trim(), password: password.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            localStorage.setItem("token", json.data.token)
            resultDiv.innerHTML = "✅ 登录成功！"
            
            setTimeout(() => {
                hideLoginModal()
                window.location.href = "/admin"
            }, 1000)
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}
</script>
</body>
</html>
