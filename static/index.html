<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <span class="logo">✦ Signal ZXH</span>
        <span onclick="showLoginModal()" class="admin-link" style="cursor:pointer;">管理</span>
    </div>
    <!-- 页面中间内容 -->
    <div style="display:flex; justify-content:center; align-items:center; height:60vh; flex-direction:column;">
        <h1 style="font-size:2.5rem; font-weight:600; background:linear-gradient(135deg,#f0f2f5,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">这是我的个人网站</h1>
        <p style="color:#9aa4b2; margin-top:12px; font-size:1.1rem;">正在建设中...</p>
        <div id="posts"></div>

            <button onclick="loadPosts()" style="margin-top:20px;padding:8px 16px;border:1px solid #23272b;background:#111;color:#fff;border-radius:8px;">
                刷新文章
            </button>
        </div>
    </div>

<!-- 登录模态框 -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#1a1a1a; padding:24px; border-radius:12px; width:320px; border:1px solid #23272b;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0;">登录管理</h2>
            <span onclick="hideLoginModal()" style="color:#9aa4b2; cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input id="loginUsername" placeholder="用户名" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <input id="loginPassword" type="password" placeholder="密码" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <button onclick="login()" style="padding:10px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer;">
                登录
            </button>
            <div id="loginResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
        </div>
    </div>
</div>

<script>
// 显示登录模态框
function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex"
}

// 隐藏登录模态框
function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none"
    document.getElementById("loginResult").innerHTML = ""
    document.getElementById("loginUsername").value = ""
    document.getElementById("loginPassword").value = ""
}

// 点击遮罩层关闭模态框
document.getElementById("loginModal").addEventListener("click", function(e) {
    if (e.target === this) {
        hideLoginModal()
    }
})

// 登录函数
async function login() {
    const username = document.getElementById("loginUsername").value
    const password = document.getElementById("loginPassword").value
    const resultDiv = document.getElementById("loginResult")

    if (!username.trim()) {
        resultDiv.innerHTML = "❌ 请输入用户名"
        return
    }
    if (!password.trim()) {
        resultDiv.innerHTML = "❌ 请输入密码"
        return
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.trim(), password: password.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            // 登录成功，保存token
            localStorage.setItem("token", json.data.token)
            resultDiv.innerHTML = "✅ 登录成功！"
            
            // 延迟关闭并跳转到管理页面
            setTimeout(() => {
                hideLoginModal()
                window.location.href = "/admin"
            }, 1000)
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}

async function loadPosts() {
    const container = document.getElementById("posts")

    try {
        const res = await fetch("/posts")
        console.log("status:", res.status)

        const text = await res.text()
        console.log("raw response:", text)

        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            container.innerHTML = "❌ JSON解析失败"
            return
        }

        if (json.code !== 0) {
            container.innerHTML = "❌ API错误: " + json.message
            return
        }

        const posts = json.data || []

        if (posts.length === 0) {
            container.innerHTML = "暂无文章"
            return
        }

        container.innerHTML = posts.map(post => `
            <div class="post-item">
                <h2>${post.title}</h2>
                <div class="post-meta"></div>
                <div class="post-excerpt">${post.content}</div>
            </div>
        `).join("")
    } catch (e) {
        console.error(e)
        container.innerHTML = "❌ 请求失败"
    }
}

document.addEventListener("DOMContentLoaded", loadPosts)
</script>          
</body>

</html>
