<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .admin-link {
            color: #6b7a8d;
            cursor: pointer;
            padding: 6px 14px;
            border: 1px solid #23272b;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .admin-link:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .post-item {
            padding: 20px 0;
            border-bottom: 1px solid #181b1e;
        }
        .post-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #23272b;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }
        .post-card:hover {
            border-color: #3b82f6;
            background: #1e1e1e;
        }
        .post-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }
        .post-excerpt {
            color: #9aa4b2;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .post-meta {
            color: #6b7a8d;
            font-size: 0.85rem;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #23272b;
            background: #1a1a1a;
            color: #9aa4b2;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .pagination button:hover:not(:disabled) {
            border-color: #3b82f6;
            color: #fff;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination button.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        .pagination-info {
            text-align: center;
            color: #6b7a8d;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .hero-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .hero-subtitle {
            color: #9aa4b2;
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            body { padding-top: 120px; }
            .header { padding: 12px 16px; flex-wrap: wrap; align-items: center; }
            .logo { font-size: 1.1rem; order: 1; }
            .nav { 
                order: 3; gap: 8px; margin: 8px auto 0; width: 100%; 
                justify-content: center; margin-left: 0; margin-right: 0;
            }
            .nav a { font-size: 0.8rem; padding: 4px 8px; }
            .header-right { order: 2; }
            .admin-link { font-size: 0.75rem; padding: 4px 10px; }
            .container { padding: 0 16px; }
            .hero-title { font-size: 1.6rem; }
            .hero-subtitle { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo" onclick="window.location.href='/'">✦ Signal ZXH</span>
    
    <div class="nav">
        <a href="/" class="active">首页</a>
        <a href="/tools">工具</a>
        <a href="/games">游戏</a>
        <a href="/about">关于</a>
    </div>
    
    <div class="header-right">
        <span onclick="showLoginModal()" class="admin-link">管理</span>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:center; align-items:flex-start; min-height: calc(100vh - 120px); flex-direction:column;">
        <h1 class="hero-title">这是我的个人网站</h1>
        <p class="hero-subtitle">正在建设中...</p>
        
        <div id="posts" style="width:100%;"></div>

    <div id="pagination" class="pagination"></div>
    <div id="pagination-info" class="pagination-info"></div>

    <button onclick="loadPosts()" style="margin-top:20px;padding:10px 20px;border:1px solid #23272b;background:#111;color:#fff;border-radius:8px;cursor:pointer;transition:all 0.2s;">
        刷新文章
    </button>
</div>

<!-- 登录模态框 -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); justify-content:center; align-items:center; z-index:2000;">
    <div style="background:#1a1a1a; padding:24px; border-radius:12px; width:320px; border:1px solid #23272b;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0;">登录管理</h2>
            <span onclick="hideLoginModal()" style="color:#9aa4b2; cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input id="loginUsername" placeholder="用户名" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <input id="loginPassword" type="password" placeholder="密码" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <button onclick="login()" style="padding:10px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer;">
                登录
            </button>
            <div id="loginResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
        </div>
    </div>
</div>

<script>
function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex"
}

function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none"
    document.getElementById("loginResult").innerHTML = ""
    document.getElementById("loginUsername").value = ""
    document.getElementById("loginPassword").value = ""
}

document.getElementById("loginModal").addEventListener("click", function(e) {
    if (e.target === this) {
        hideLoginModal()
    }
})

async function login() {
    const username = document.getElementById("loginUsername").value
    const password = document.getElementById("loginPassword").value
    const resultDiv = document.getElementById("loginResult")

    if (!username.trim()) {
        resultDiv.innerHTML = "❌ 请输入用户名"
        return
    }
    if (!password.trim()) {
        resultDiv.innerHTML = "❌ 请输入密码"
        return
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.trim(), password: password.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            localStorage.setItem("token", json.data.token)
            resultDiv.innerHTML = "✅ 登录成功！"
            
            setTimeout(() => {
                hideLoginModal()
                window.location.href = "/admin"
            }, 1000)
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}

let currentPage = 1
const pageSize = 10

async function loadPosts(page = 1) {
    currentPage = page
    const container = document.getElementById("posts")

    try {
        const res = await fetch(`/posts/detail?page=${page}&page_size=${pageSize}`, { cache: "no-cache" })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            container.innerHTML = "<p style='color:#9aa4b2; text-align:center; padding:20px 0;'>❌ JSON解析失败</p>"
            return
        }

        if (json.code !== 0) {
            container.innerHTML = "<p style='color:#9aa4b2; text-align:center; padding:20px 0;'>❌ API错误: " + json.message + "</p>"
            return
        }

        const data = json.data || {}
        const posts = data.data || []
        const total = data.total || 0
        const current = data.page || 1
        const size = data.page_size || 10

        if (posts.length === 0) {
            container.innerHTML = "<p style='color:#9aa4b2; text-align:center; padding:20px 0;'>暂无文章</p>"
            renderPagination(0, 1, size)
            return
        }

        container.innerHTML = posts.map(post => {
            const excerpt = post.content.length > 150
                ? post.content.substring(0, 150) + '...'
                : post.content;
            
            const categoryHtml = post.category ? `<span style="background:#3b82f6; color:#fff; padding:2px 8px; border-radius:4px; font-size:0.75rem; margin-right:8px;">${post.category}</span>` : ''
            const tagsHtml = post.tags && post.tags.length > 0 
                ? post.tags.map(tag => `<span style="background:#6b7280; color:#fff; padding:2px 8px; border-radius:4px; font-size:0.75rem; margin-right:4px;">${tag}</span>`).join('')
                : ''

            return `
                <div class="post-card" onclick="window.location.href='/post-detail.html?id=${post.id}'">
                    <h2>${post.title}</h2>
                    <div style="margin-bottom:8px;">${categoryHtml}${tagsHtml}</div>
                    <div class="post-excerpt">${excerpt}</div>
                    <div class="post-meta">点击查看全文</div>
                </div>
            `;
        }).join("")

        renderPagination(total, current, size)
    } catch (e) {
        console.error(e)
        container.innerHTML = "<p style='color:#9aa4b2; text-align:center; padding:20px 0;'>❌ 请求失败</p>"
    }
}

function renderPagination(total, current, size) {
    const paginationDiv = document.getElementById("pagination")
    const infoDiv = document.getElementById("pagination-info")

    if (total === 0) {
        paginationDiv.innerHTML = ""
        infoDiv.innerHTML = ""
        return
    }

    const totalPages = Math.ceil(total / size)
    const start = Math.max(1, current - 2)
    const end = Math.min(totalPages, current + 2)

    let html = `
        <button onclick="loadPosts(${current - 1})" ${current <= 1 ? 'disabled' : ''}>上一页</button>
    `

    if (start > 1) {
        html += `<button onclick="loadPosts(1)">1</button>`
        if (start > 2) {
            html += `<span style="color:#6b7a8d; padding:8px;">...</span>`
        }
    }

    for (let i = start; i <= end; i++) {
        html += `<button onclick="loadPosts(${i})" ${i === current ? 'class="active"' : ''}>${i}</button>`
    }

    if (end < totalPages) {
        if (end < totalPages - 1) {
            html += `<span style="color:#6b7a8d; padding:8px;">...</span>`
        }
        html += `<button onclick="loadPosts(${totalPages})">${totalPages}</button>`
    }

    html += `
        <button onclick="loadPosts(${current + 1})" ${current >= totalPages ? 'disabled' : ''}>下一页</button>
    `

    paginationDiv.innerHTML = html
    infoDiv.innerHTML = `共 ${total} 篇文章，当前第 ${current} 页 / 共 ${totalPages} 页`
}

document.addEventListener("DOMContentLoaded", loadPosts)
</script>          
</body>
</html>
