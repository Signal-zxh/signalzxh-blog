<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .admin-link {
            color: #6b7a8d;
            cursor: pointer;
            padding: 6px 14px;
            border: 1px solid #23272b;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .admin-link:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .back-btn {
            color: #9aa4b2;
            cursor: pointer;
            padding: 8px 16px;
            border: 1px solid #23272b;
            border-radius: 8px;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-btn:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .post-detail {
            background: #1a1a1a;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #23272b;
        }
        .post-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        .post-content {
            color: #ecedee;
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
        }
        .loading, .error, .not-found {
            text-align: center;
            padding: 60px 20px;
            color: #9aa4b2;
        }
        .error {
            color: #ef4444;
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo" onclick="window.location.href='/'">✦ Signal ZXH</span>
    
    <div class="nav">
        <a href="/">首页</a>
        <a href="/tools">工具</a>
        <a href="/games">游戏</a>
        <a href="/about">关于</a>
    </div>
    
    <div class="header-right">
        <span onclick="showLoginModal()" class="admin-link">管理</span>
    </div>
</div>

<div class="container">
    <span class="back-btn" onclick="window.location.href='/'">← 返回列表</span>
    
    <div id="postDetail">
        <div class="loading">加载中...</div>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); justify-content:center; align-items:center; z-index:2000;">
    <div style="background:#1a1a1a; padding:24px; border-radius:12px; width:320px; border:1px solid #23272b;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0;">登录管理</h2>
            <span onclick="hideLoginModal()" style="color:#9aa4b2; cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input id="loginUsername" placeholder="用户名" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <input id="loginPassword" type="password" placeholder="密码" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <button onclick="login()" style="padding:10px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer;">
                登录
            </button>
            <div id="loginResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
        </div>
    </div>
</div>

<script>
const postId = new URLSearchParams(window.location.search).get('id');

async function loadPost() {
    const container = document.getElementById('postDetail');

    if (!postId) {
        container.innerHTML = '<div class="error">文章ID缺失</div>';
        return;
    }

    try {
        const res = await fetch(`/posts/${postId}`);
        const text = await res.text();
        let json;

        try {
            json = JSON.parse(text);
        } catch (e) {
            container.innerHTML = '<div class="error">数据格式错误</div>';
            return;
        }

        if (json.code !== 0) {
            container.innerHTML = `<div class="not-found">❌ ${json.message}</div>`;
            return;
        }

        const post = json.data;
        container.innerHTML = `
            <div class="post-detail">
                <h1 class="post-title">${post.title}</h1>
                <div class="post-content">${post.content}</div>
            </div>
        `;
    } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="error">❌ 请求失败</div>';
    }
}

document.addEventListener('DOMContentLoaded', loadPost);

function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex"
}

function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none"
    document.getElementById("loginResult").innerHTML = ""
    document.getElementById("loginUsername").value = ""
    document.getElementById("loginPassword").value = ""
}

document.getElementById("loginModal").addEventListener("click", function(e) {
    if (e.target === this) {
        hideLoginModal()
    }
})

async function login() {
    const username = document.getElementById("loginUsername").value
    const password = document.getElementById("loginPassword").value
    const resultDiv = document.getElementById("loginResult")

    if (!username.trim()) {
        resultDiv.innerHTML = "❌ 请输入用户名"
        return
    }
    if (!password.trim()) {
        resultDiv.innerHTML = "❌ 请输入密码"
        return
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.trim(), password: password.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            localStorage.setItem("token", json.data.token)
            resultDiv.innerHTML = "✅ 登录成功！"
            
            setTimeout(() => {
                hideLoginModal()
                window.location.href = "/admin"
            }, 1000)
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}
</script>
</body>
</html>
