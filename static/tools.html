<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .admin-link {
            color: #6b7a8d;
            cursor: pointer;
            padding: 6px 14px;
            border: 1px solid #23272b;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .admin-link:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 20px;
        }
        .card h3 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 1.25rem;
        }
        .card p {
            color: #9aa4b2;
            line-height: 1.6;
        }
        
        /* 番茄钟样式 */
        .pomodoro {
            text-align: center;
            padding: 20px 0;
        }
        .mode-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .mode-btn {
            padding: 8px 16px;
            border: 1px solid #23272b;
            background: transparent;
            color: #9aa4b2;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .mode-btn:hover {
            border-color: #3b82f6;
            color: #fff;
        }
        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            color: #fff;
            margin: 20px 0;
            letter-spacing: 4px;
        }
        .timer-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .timer-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-start {
            background: #3b82f6;
            color: #fff;
        }
        .btn-start:hover {
            background: #2563eb;
        }
        .btn-reset {
            background: #23272b;
            color: #9aa4b2;
        }
        .btn-reset:hover {
            background: #2d3339;
            color: #fff;
        }
        .pomodoro-stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            padding: 20px 0;
            border-top: 1px solid #23272b;
            margin-top: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #3b82f6;
        }
        .stat-label {
            color: #9aa4b2;
            font-size: 14px;
            margin-top: 4px;
        }
        .notification {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            z-index: 3000;
            display: none;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo">✦ Signal </span>
    
    <div class="nav">
        <a href="/">首页</a>
        <a href="/tools" class="active">工具</a>
        <a href="/games">游戏</a>
        <a href="/about">关于</a>
    </div>
    
    <div class="header-right">
        <span onclick="showLoginModal()" class="admin-link">管理</span>
    </div>
</div>

<div class="container">
    <!-- 番茄钟 -->
    <div class="card">
        <h3>🍅 番茄钟</h3>
        <div class="pomodoro">
            <div class="mode-buttons">
                <button class="mode-btn active" onclick="setMode('work')">专注工作</button>
                <button class="mode-btn" onclick="setMode('short')">短休息</button>
                <button class="mode-btn" onclick="setMode('long')">长休息</button>
            </div>
            
            <div id="timerDisplay" class="timer-display">25:00</div>
            
            <div class="timer-buttons">
                <button id="startBtn" class="timer-btn btn-start" onclick="toggleTimer()">开始</button>
                <button class="timer-btn btn-reset" onclick="resetTimer()">重置</button>
            </div>
            
            <div class="pomodoro-stats">
                <div class="stat-item">
                    <div id="completedPomodoros" class="stat-value">0</div>
                    <div class="stat-label">完成番茄数</div>
                </div>
                <div class="stat-item">
                    <div id="totalMinutes" class="stat-value">0</div>
                    <div class="stat-label">累计分钟</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🛠️ 更多工具</h3>
        <p>更多实用工具正在开发中...敬请期待！</p>
        <ul>
            <li>在线代码编辑器</li>
            <li>Markdown 转换器</li>
            <li>时间戳工具</li>
            <li>JSON 格式化工具</li>
        </ul>
    </div>
</div>

<!-- 完成通知 -->
<div id="notification" class="notification">🎉 时间到！休息一下吧！</div>

<!-- 登录模态框 -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); justify-content:center; align-items:center; z-index:2000;">
    <div style="background:#1a1a1a; padding:24px; border-radius:12px; width:320px; border:1px solid #23272b;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0;">登录管理</h2>
            <span onclick="hideLoginModal()" style="color:#9aa4b2; cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <input id="loginUsername" placeholder="用户名" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <input id="loginPassword" type="password" placeholder="密码" style="padding:10px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff;" />
            <button onclick="login()" style="padding:10px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer;">
                登录
            </button>
            <div id="loginResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
        </div>
    </div>
</div>

<script>
// 番茄钟状态
let timerInterval = null;
let timeLeft = 25 * 60; // 剩余秒数
let isRunning = false;
let currentMode = 'work'; // work, short, long
let completedPomodoros = parseInt(localStorage.getItem('completedPomodoros')) || 0;
let totalMinutes = parseInt(localStorage.getItem('totalMinutes')) || 0;
let isAlerting = false;  // 是否正在提醒状态
let alertInterval = null; // 闪烁定时器
let originalTitle = '工具 - Signal ZXH'; // 原始标题

// 初始化显示
document.getElementById('completedPomodoros').textContent = completedPomodoros;
document.getElementById('totalMinutes').textContent = totalMinutes;
updateDisplay();

// 模式配置
const modes = {
    work: 25,
    short: 5,
    long: 15
};

function setMode(mode) {
    if (isRunning) {
        stopTimer();
    }
    currentMode = mode;
    
    // 更新按钮样式
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // 设置时间
    timeLeft = modes[mode] * 60;
    updateDisplay();
}

function updateDisplay() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    document.getElementById('timerDisplay').textContent = timeStr;
    
    // 更新页面标题显示倒计时
    if (isRunning) {
        document.title = `⏱ ${timeStr} - 番茄钟`;
    } else {
        document.title = originalTitle;
    }
}

function toggleTimer() {
    if (isRunning) {
        stopTimer();
    } else {
        startTimer();
    }
}

function startTimer() {
    isRunning = true;
    document.getElementById('startBtn').textContent = '暂停';
    
    timerInterval = setInterval(() => {
        timeLeft--;
        updateDisplay();
        
        if (timeLeft <= 0) {
            onTimerComplete();
        }
    }, 1000);
}

function stopTimer() {
    isRunning = false;
    document.getElementById('startBtn').textContent = '开始';
    
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function resetTimer() {
    stopTimer();
    timeLeft = modes[currentMode] * 60;
    updateDisplay();
}

function onTimerComplete() {
    stopTimer();
    isAlerting = true;
    
    let alertMessage = '';
    let alertTitle = '';
    
    // 统计
    if (currentMode === 'work') {
        completedPomodoros++;
        totalMinutes += modes.work;
        localStorage.setItem('completedPomodoros', completedPomodoros);
        localStorage.setItem('totalMinutes', totalMinutes);
        document.getElementById('completedPomodoros').textContent = completedPomodoros;
        document.getElementById('totalMinutes').textContent = totalMinutes;
        
        alertMessage = '🎉 专注完成！休息一下吧！';
        alertTitle = '🎉 专注完成！';
    } else {
        alertMessage = '☕ 休息结束！继续加油！';
        alertTitle = '☕ 休息结束！';
    }
    
    // 显示通知
    showNotification(alertMessage);
    
    // 开始持续闪烁提醒
    startAlerting(alertTitle);
}

function startAlerting(message) {
    // 持续播放提示音
    const soundInterval = setInterval(() => {
        if (!isAlerting) {
            clearInterval(soundInterval);
            return;
        }
        playNotificationSound();
    }, 2000); // 每2秒播放一次
    
    // 标题闪烁
    let showMessage = true;
    alertInterval = setInterval(() => {
        if (showMessage) {
            document.title = message;
        } else {
            document.title = '⏰ 时间到！';
        }
        showMessage = !showMessage;
    }, 500); // 每0.5秒切换一次
    
    // 通知持续显示
    const notification = document.getElementById('notification');
    notification.style.display = 'block';
}

function stopAlerting() {
    isAlerting = false;
    if (alertInterval) {
        clearInterval(alertInterval);
        alertInterval = null;
    }
    document.title = originalTitle;
    document.getElementById('notification').style.display = 'none';
}

function showNotification(message) {
    const notification = document.getElementById('notification');
    notification.textContent = message;
    notification.style.display = 'block';
    
    setTimeout(() => {
        notification.style.display = 'none';
    }, 3000);
}

function playNotificationSound() {
    // 使用 Web Audio API 播放简单的提示音
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
    } catch (e) {
        console.log('提示音播放失败:', e);
    }
}

function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex"
}

function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none"
    document.getElementById("loginResult").innerHTML = ""
    document.getElementById("loginUsername").value = ""
    document.getElementById("loginPassword").value = ""
}

document.getElementById("loginModal").addEventListener("click", function(e) {
    if (e.target === this) {
        hideLoginModal()
    }
})

async function login() {
    const username = document.getElementById("loginUsername").value
    const password = document.getElementById("loginPassword").value
    const resultDiv = document.getElementById("loginResult")

    if (!username.trim()) {
        resultDiv.innerHTML = "❌ 请输入用户名"
        return
    }
    if (!password.trim()) {
        resultDiv.innerHTML = "❌ 请输入密码"
        return
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username.trim(), password: password.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            localStorage.setItem("token", json.data.token)
            resultDiv.innerHTML = "✅ 登录成功！"
            
            setTimeout(() => {
                hideLoginModal()
                window.location.href = "/admin"
            }, 1000)
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}

// 点击任意位置停止提醒
document.addEventListener('click', function() {
    if (isAlerting) {
        stopAlerting();
        
        // 自动切换到下一个模式
        if (currentMode === 'work') {
            // 每4个番茄钟后长休息
            if (completedPomodoros % 4 === 0) {
                setMode('long');
                document.querySelectorAll('.mode-btn')[2].classList.add('active');
            } else {
                setMode('short');
                document.querySelectorAll('.mode-btn')[1].classList.add('active');
            }
        } else {
            setMode('work');
            document.querySelectorAll('.mode-btn')[0].classList.add('active');
        }
    }
});
</script>
</body>
</html>
