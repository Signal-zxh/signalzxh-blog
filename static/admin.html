<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .logout-link {
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .logout-link:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        .form-card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .form-card h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .form-group input,
        .form-group textarea {
            display: block;
            width: 100%;
            padding: 12px;
            border: 1px solid #23272b;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
            word-break: break-all;
            overflow-wrap: break-word;
        }
        .form-group button {
            padding: 12px;
            border: none;
            background: #3b82f6;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .form-group button:hover {
            background: #2563eb;
        }
        .form-result {
            color: #9aa4b2;
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
        }
        .list-card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 40px;
        }
        .list-card h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }
        .post-item {
            border-bottom: 1px solid #23272b;
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-info h3 {
            color: #fff;
            margin: 0 0 8px 0;
            font-size: 1.1rem;
        }
        .post-info p {
            color: #9aa4b2;
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .post-meta {
            color: #6b7280;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .post-actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit {
            padding: 6px 12px;
            border: none;
            background: #f59e0b;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-edit:hover {
            background: #d97706;
        }
        .btn-delete {
            padding: 6px 12px;
            border: none;
            background: #ef4444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .edit-form input,
        .edit-form textarea {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            background: #111;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .edit-form textarea {
            min-height: 100px;
            resize: vertical;
            word-break: break-all;
            overflow-wrap: break-word;
        }
        .edit-actions {
            display: flex;
            gap: 10px;
        }
        .btn-save {
            padding: 8px 16px;
            border: none;
            background: #22c55e;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-save:hover {
            background: #16a34a;
        }
        .btn-cancel {
            padding: 8px 16px;
            border: none;
            background: #6b7280;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-cancel:hover {
            background: #4b5563;
        }

        @media (max-width: 768px) {
            body { padding-top: 120px; }
            .header { padding: 12px 16px; flex-wrap: wrap; align-items: center; }
            .logo { font-size: 1.1rem; order: 1; }
            .nav { 
                order: 3; gap: 8px; margin: 8px auto 0; width: 100%; 
                justify-content: center; margin-left: 0; margin-right: 0;
            }
            .nav a { font-size: 0.8rem; padding: 4px 8px; }
            .header-right { order: 2; }
            .logout-link { font-size: 0.75rem; padding: 4px 10px; }
            .container { padding: 0 16px; }
            .form-card, .list-card { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo" onclick="window.location.href='/'">✦ Signal ZXH</span>

    <div class="nav">
        <a href="/">首页</a>
        <a href="/tools">工具</a>
        <a href="/games">游戏</a>
        <a href="/about">关于</a>
        <a href="/admin/categories">分类管理</a>
        <a href="/admin/tags">标签管理</a>
    </div>

    <div class="header-right">
        <span onclick="logout()" class="logout-link">退出登录</span>
    </div>
</div>

<div class="container">
    <!-- 发布文章表单 -->
    <div class="form-card">
        <h2>发布新文章</h2>
        <div class="form-group">
            <input id="postTitle" placeholder="文章标题" />
            <textarea id="postContent" placeholder="文章内容"></textarea>
            <select id="postCategory" style="padding:12px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff; font-size:16px;">
                <option value="">选择分类</option>
            </select>
            <input id="postTags" placeholder="标签（用逗号分隔）" />
            <button onclick="createPost()">发布文章</button>
            <div id="createResult" class="form-result"></div>
        </div>
    </div>

    <!-- 文章列表 -->
    <div class="list-card">
        <h2>文章管理</h2>
        <div id="postsList"></div>
    </div>
</div>

<script>
function checkLogin() {
    const token = localStorage.getItem('token')
    if (!token) {
        window.location.href = '/'
        return null
    }
    return token
}

function logout() {
    localStorage.removeItem('token')
    window.location.href = '/'
}

async function loadCategories() {
    try {
        const res = await fetch('/categories', { cache: 'no-cache' })
        const text = await res.text()
        const json = JSON.parse(text)
        
        if (json.code === 0) {
            window.categoriesData = json.data || []
            const select = document.getElementById('postCategory')
            select.innerHTML = '<option value="">选择分类</option>'
            window.categoriesData.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`
            })
        }
    } catch (e) {
        console.error('加载分类失败', e)
    }
}

async function createPost() {
    const token = checkLogin()
    if (!token) return

    const title = document.getElementById('postTitle').value
    const content = document.getElementById('postContent').value
    const categoryId = document.getElementById('postCategory').value
    const tagsInput = document.getElementById('postTags').value
    const resultDiv = document.getElementById('createResult')

    if (!title.trim()) {
        resultDiv.innerHTML = '❌ 请输入标题'
        return
    }
    if (!content.trim()) {
        resultDiv.innerHTML = '❌ 请输入内容'
        return
    }

    const tags = tagsInput.split(',').map(t => t.trim()).filter(t => t)

    try {
        const res = await fetch('/api/posts/with-tag', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ 
                title: title.trim(), 
                content: content.trim(),
                category_id: categoryId ? parseInt(categoryId) : null,
                tags: tags
            })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = '❌ 服务器返回格式错误'
            return
        }

        if (json.code === 0) {
            resultDiv.innerHTML = '✅ 发布成功！'
            document.getElementById('postTitle').value = ''
            document.getElementById('postContent').value = ''
            document.getElementById('postCategory').value = ''
            document.getElementById('postTags').value = ''
            loadPosts()
        } else {
            resultDiv.innerHTML = '❌ ' + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = '❌ 请求失败'
    }
}

async function loadPosts() {
    const token = checkLogin()
    if (!token) return

    const container = document.getElementById('postsList')

    try {
        const res = await fetch('/posts/detail', {
            headers: { 'Authorization': 'Bearer ' + token },
            cache: 'no-cache'
        })

        const text = await res.text()
        console.log('API Response:', text)
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ JSON解析失败</p>'
            return
        }

        if (json.code !== 0) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ ' + json.message + '</p>'
            return
        }

        const posts = json.data.data || []
        console.log('Posts found:', posts.length)

        if (posts.length === 0) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">暂无文章</p>'
            return
        }

        window.postsData = posts
        container.innerHTML = posts.map(post => {
            const categoryHtml = post.category ? `<span style="background:#3b82f6; color:#fff; padding:2px 6px; border-radius:4px; font-size:0.75rem; margin-right:8px;">${post.category}</span>` : ''
            const tagsHtml = post.tags && post.tags.length > 0 
                ? post.tags.map(tag => `<span style="background:#6b7280; color:#fff; padding:2px 6px; border-radius:4px; font-size:0.75rem; margin-right:4px;">${tag}</span>`).join('')
                : ''
            return `
            <div class="post-item" id="post-${post.id}">
                <div class="post-info">
                    <h3>${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.content)}</p>
                    <div class="post-meta">${categoryHtml}${tagsHtml}</div>
                </div>
                <div class="post-actions">
                    <button onclick="editPost(${post.id})" class="btn-edit">编辑</button>
                    <button onclick="deletePost(${post.id})" class="btn-delete">删除</button>
                </div>
            </div>
        `}).join('')
    } catch (e) {
        console.error(e)
        container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ 请求失败</p>'
    }
}

async function deletePost(id) {
    const token = checkLogin()
    if (!token) return

    if (!confirm('确定要删除这篇文章吗？')) {
        return
    }

    try {
        const res = await fetch('/api/posts/' + id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })

        const text = await res.text()
        let json = JSON.parse(text)

        if (json.code === 0) {
            alert('删除成功')
            loadPosts()
        } else {
            alert('删除失败: ' + json.message)
        }
    } catch (e) {
        console.error(e)
        alert('删除失败')
    }
}

function escapeHtml(text) {
    const div = document.createElement('div')
    div.textContent = text
    return div.innerHTML
}

function editPost(id) {
    const item = document.getElementById('post-' + id)
    if (!item) return

    const post = (window.postsData || []).find(p => p.id === id)
    const title = post ? post.title : ''
    const content = post ? post.content : ''
    const selectedCategory = (window.categoriesData || []).find(cat => cat.name === (post && post.category))
    const initialTags = post && post.tags ? post.tags.join(', ') : ''

    item.innerHTML = `
        <div class="edit-form" style="width:100%;">
            <input id="edit-title-${id}" value="${escapeHtml(title)}" placeholder="文章标题" />
            <textarea id="edit-content-${id}" placeholder="文章内容">${escapeHtml(content)}</textarea>
            <select id="edit-category-${id}" style="padding:10px; border:1px solid #3b82f6; border-radius:6px; background:#111; color:#fff; font-size:15px;">
                <option value="">选择分类</option>
                ${(window.categoriesData || []).map(cat => `<option value="${cat.id}" ${selectedCategory && selectedCategory.id === cat.id ? 'selected' : ''}>${escapeHtml(cat.name)}</option>`).join('')}
            </select>
            <input id="edit-tags-${id}" value="${escapeHtml(initialTags)}" placeholder="标签（用逗号分隔）" />
            <div class="edit-actions">
                <button onclick="savePost(${id})" class="btn-save">保存</button>
                <button onclick="cancelEdit(${id})" class="btn-cancel">取消</button>
            </div>
        </div>
    `
}

async function savePost(id) {
    const token = checkLogin()
    if (!token) return

    const title = document.getElementById('edit-title-' + id).value.trim()
    const content = document.getElementById('edit-content-' + id).value.trim()
    const categoryId = document.getElementById('edit-category-' + id).value
    const tagsInput = document.getElementById('edit-tags-' + id).value
    const tags = tagsInput.split(',').map(t => t.trim()).filter(Boolean)

    if (!title) {
        alert('❌ 请输入标题')
        return
    }
    if (!content) {
        alert('❌ 请输入内容')
        return
    }

    try {
        const res = await fetch('/api/posts/' + id + '/with-tag', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                title,
                content,
                category_id: categoryId ? parseInt(categoryId) : null,
                tags
            })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            alert('❌ 服务器返回格式错误')
            return
        }

        if (json.code === 0) {
            alert('✅ 更新成功')
            loadPosts()
        } else {
            alert('❌ ' + json.message)
        }
    } catch (e) {
        console.error(e)
        alert('❌ 请求失败')
    }
}

function cancelEdit(id) {
    loadPosts()
}

document.addEventListener('DOMContentLoaded', function() {
    checkLogin()
    loadCategories()
    loadPosts()
})
</script>
</body>
</html>
