<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <span class="logo">✦ Signal ZXH</span>
        <div style="display:flex; gap:20px; align-items:center;">
            <a href="/" style="color:#9aa4b2; text-decoration:none;">首页</a>
            <span onclick="logout()" style="color:#ef4444; cursor:pointer;">退出登录</span>
        </div>
    </div>

    <div style="max-width:800px; margin:0 auto; padding:20px;">
        <!-- 发布文章表单 -->
        <div style="background:#1a1a1a; padding:24px; border-radius:12px; border:1px solid #23272b; margin-bottom:20px;">
            <h2 style="color:#fff; margin:0 0 20px 0;">发布新文章</h2>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <input id="postTitle" placeholder="文章标题" style="padding:12px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff; font-size:16px;" />
                <textarea id="postContent" placeholder="文章内容" rows="6" style="padding:12px; border:1px solid #23272b; border-radius:8px; background:#111; color:#fff; font-size:14px; resize:vertical;"></textarea>
                <button onclick="createPost()" style="padding:12px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer; font-size:16px;">
                    发布文章
                </button>
                <div id="createResult" style="color:#9aa4b2; text-align:center; font-size:14px;"></div>
            </div>
        </div>

        <!-- 文章列表 -->
        <div style="background:#1a1a1a; padding:24px; border-radius:12px; border:1px solid #23272b;">
            <h2 style="color:#fff; margin:0 0 20px 0;">文章管理</h2>
            <div id="postsList"></div>
        </div>
    </div>
</div>

<script>
// 检查是否已登录
function checkLogin() {
    const token = localStorage.getItem("token")
    if (!token) {
        window.location.href = "/"
        return
    }
    return token
}

// 退出登录
function logout() {
    localStorage.removeItem("token")
    window.location.href = "/"
}

// 发布文章
async function createPost() {
    const token = checkLogin()
    if (!token) return

    const title = document.getElementById("postTitle").value
    const content = document.getElementById("postContent").value
    const resultDiv = document.getElementById("createResult")

    if (!title.trim()) {
        resultDiv.innerHTML = "❌ 请输入标题"
        return
    }
    if (!content.trim()) {
        resultDiv.innerHTML = "❌ 请输入内容"
        return
    }

    try {
        const res = await fetch("/posts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ title: title.trim(), content: content.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = "❌ 服务器返回格式错误"
            return
        }

        if (json.code === 0) {
            resultDiv.innerHTML = "✅ 发布成功！"
            document.getElementById("postTitle").value = ""
            document.getElementById("postContent").value = ""
            loadPosts()
        } else {
            resultDiv.innerHTML = "❌ " + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = "❌ 请求失败"
    }
}

// 加载文章列表
async function loadPosts() {
    const token = checkLogin()
    if (!token) return

    const container = document.getElementById("postsList")

    try {
        const res = await fetch("/posts", {
            headers: { "Authorization": "Bearer " + token }
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            container.innerHTML = "❌ JSON解析失败"
            return
        }

        if (json.code !== 0) {
            container.innerHTML = "❌ " + json.message
            return
        }

        const posts = json.data || []

        if (posts.length === 0) {
            container.innerHTML = "<p style='color:#9aa4b2; text-align:center;'>暂无文章</p>"
            return
        }

        container.innerHTML = posts.map(post => `
            <div style="border-bottom:1px solid #23272b; padding:16px 0; last-child { border-bottom:none; }">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h3 style="color:#fff; margin:0 0 8px 0;">${post.title}</h3>
                        <p style="color:#9aa4b2; margin:0; font-size:14px; line-height:1.5;">${post.content}</p>
                        <div style="color:#6b7280; font-size:12px; margin-top:8px;">ID: ${post.id}</div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="editPost(${post.id})" style="padding:6px 12px; border:none; background:#f59e0b; color:#fff; border-radius:6px; cursor:pointer; font-size:14px;">编辑</button>
                        <button onclick="deletePost(${post.id})" style="padding:6px 12px; border:none; background:#ef4444; color:#fff; border-radius:6px; cursor:pointer; font-size:14px;">删除</button>
                    </div>
                </div>
            </div>
        `).join("")
    } catch (e) {
        console.error(e)
        container.innerHTML = "❌ 请求失败"
    }
}

// 删除文章
async function deletePost(id) {
    const token = checkLogin()
    if (!token) return

    if (!confirm("确定要删除这篇文章吗？")) {
        return
    }

    try {
        const res = await fetch("/posts/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        })

        const text = await res.text()
        let json = JSON.parse(text)

        if (json.code === 0) {
            alert("删除成功")
            loadPosts()
        } else {
            alert("删除失败: " + json.message)
        }
    } catch (e) {
        console.error(e)
        alert("删除失败")
    }
}

// 编辑文章（简单实现）
function editPost(id) {
    alert("编辑功能开发中，文章ID: " + id)
}

// 页面加载时检查登录并加载文章
document.addEventListener("DOMContentLoaded", function() {
    checkLogin()
    loadPosts()
})
</script>
</body>
</html>
