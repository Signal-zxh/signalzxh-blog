<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Signal ZXH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0b0d0f;
            color: #ecedee;
            padding-top: 80px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(11, 13, 15, 0.98);
            border-bottom: 1px solid #23272b;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f2f5, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
            margin-right: 20px;
        }
        .nav a {
            color: #9aa4b2;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.25);
        }
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .logout-link {
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .logout-link:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        .form-card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 20px;
        }
        .form-card h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 1px solid #23272b;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-group button {
            padding: 12px;
            border: none;
            background: #3b82f6;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .form-group button:hover {
            background: #2563eb;
        }
        .form-result {
            color: #9aa4b2;
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
        }
        .list-card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #23272b;
            margin-bottom: 40px;
        }
        .list-card h2 {
            color: #fff;
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }
        .post-item {
            border-bottom: 1px solid #23272b;
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-info h3 {
            color: #fff;
            margin: 0 0 8px 0;
            font-size: 1.1rem;
        }
        .post-info p {
            color: #9aa4b2;
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .post-meta {
            color: #6b7280;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .post-actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit {
            padding: 6px 12px;
            border: none;
            background: #f59e0b;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-edit:hover {
            background: #d97706;
        }
        .btn-delete {
            padding: 6px 12px;
            border: none;
            background: #ef4444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
<div class="header">
    <span class="logo">✦ Signal </span>
    
    <div class="nav">
        <a href="/">首页</a>
        <a href="/tools">工具</a>
        <a href="/games">游戏</a>
        <a href="/about">关于</a>
    </div>
    
    <div class="header-right">
        <span onclick="logout()" class="logout-link">退出登录</span>
    </div>
</div>

<div class="container">
    <!-- 发布文章表单 -->
    <div class="form-card">
        <h2>发布新文章</h2>
        <div class="form-group">
            <input id="postTitle" placeholder="文章标题" />
            <textarea id="postContent" placeholder="文章内容"></textarea>
            <button onclick="createPost()">发布文章</button>
            <div id="createResult" class="form-result"></div>
        </div>
    </div>

    <!-- 文章列表 -->
    <div class="list-card">
        <h2>文章管理</h2>
        <div id="postsList"></div>
    </div>
</div>

<script>
function checkLogin() {
    const token = localStorage.getItem('token')
    if (!token) {
        window.location.href = '/'
        return null
    }
    return token
}

function logout() {
    localStorage.removeItem('token')
    window.location.href = '/'
}

async function createPost() {
    const token = checkLogin()
    if (!token) return

    const title = document.getElementById('postTitle').value
    const content = document.getElementById('postContent').value
    const resultDiv = document.getElementById('createResult')

    if (!title.trim()) {
        resultDiv.innerHTML = '❌ 请输入标题'
        return
    }
    if (!content.trim()) {
        resultDiv.innerHTML = '❌ 请输入内容'
        return
    }

    try {
        const res = await fetch('/posts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ title: title.trim(), content: content.trim() })
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            resultDiv.innerHTML = '❌ 服务器返回格式错误'
            return
        }

        if (json.code === 0) {
            resultDiv.innerHTML = '✅ 发布成功！'
            document.getElementById('postTitle').value = ''
            document.getElementById('postContent').value = ''
            loadPosts()
        } else {
            resultDiv.innerHTML = '❌ ' + json.message
        }
    } catch (e) {
        console.error(e)
        resultDiv.innerHTML = '❌ 请求失败'
    }
}

async function loadPosts() {
    const token = checkLogin()
    if (!token) return

    const container = document.getElementById('postsList')

    try {
        const res = await fetch('/posts', {
            headers: { 'Authorization': 'Bearer ' + token }
        })

        const text = await res.text()
        let json
        try {
            json = JSON.parse(text)
        } catch (e) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ JSON解析失败</p>'
            return
        }

        if (json.code !== 0) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ ' + json.message + '</p>'
            return
        }

        const posts = json.data || []

        if (posts.length === 0) {
            container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">暂无文章</p>'
            return
        }

        container.innerHTML = posts.map(post => `
            <div class="post-item">
                <div class="post-info">
                    <h3>${post.title}</h3>
                    <p>${post.content}</p>
                    <div class="post-meta">ID: ${post.id}</div>
                </div>
                <div class="post-actions">
                    <button onclick="editPost(${post.id})" class="btn-edit">编辑</button>
                    <button onclick="deletePost(${post.id})" class="btn-delete">删除</button>
                </div>
            </div>
        `).join('')
    } catch (e) {
        console.error(e)
        container.innerHTML = '<p style="color:#9aa4b2; text-align:center;">❌ 请求失败</p>'
    }
}

async function deletePost(id) {
    const token = checkLogin()
    if (!token) return

    if (!confirm('确定要删除这篇文章吗？')) {
        return
    }

    try {
        const res = await fetch('/posts/' + id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        })

        const text = await res.text()
        let json = JSON.parse(text)

        if (json.code === 0) {
            alert('删除成功')
            loadPosts()
        } else {
            alert('删除失败: ' + json.message)
        }
    } catch (e) {
        console.error(e)
        alert('删除失败')
    }
}

function editPost(id) {
    alert('编辑功能开发中，文章ID: ' + id)
}

document.addEventListener('DOMContentLoaded', function() {
    checkLogin()
    loadPosts()
})
</script>
</body>
</html>
