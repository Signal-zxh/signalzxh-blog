basePath: /
definitions:
  model.Category:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  model.PageResponse:
    properties:
      data:
        description: 数据列表
      page:
        description: 当前页码
        type: integer
      page_size:
        description: 每页数量
        type: integer
      total:
        description: 总数量
        type: integer
    type: object
  model.Post:
    properties:
      category_id:
        description: 分类ID
        type: integer
      content:
        description: 文章内容
        type: string
      id:
        description: 文章ID
        type: integer
      title:
        description: 文章标题
        type: string
      user_id:
        description: 作者ID
        type: integer
    type: object
  model.PostWithCategoryTag:
    properties:
      category:
        type: string
      content:
        type: string
      id:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      user_id:
        type: integer
    type: object
  model.Response:
    properties:
      code:
        description: 状态码，0表示成功
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
  model.Tag:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: 博客系统的 RESTful API 接口文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Signalzxh Blog API
  version: "1.0"
paths:
  /agent:
    post:
      consumes:
      - application/json
      description: 调用AI Agent处理查询请求
      parameters:
      - description: 查询内容
        in: body
        name: request
        required: true
        schema:
          properties:
            query:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  properties:
                    result:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: AI Agent工具
      tags:
      - tools
  /categories:
    get:
